<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Materias</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        .card {
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
        }
        .table-hover tbody tr:hover {
            background-color: #f5f5f5;
        }
        .badge-dia {
            font-size: 0.85rem;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-graduation-cap"></i> Sistema de Notas
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/alumnos">Alumnos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/maestros">Maestros</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/materias">Materias</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Alertas -->
    <div th:if="${param.exito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle"></i> <span th:text="${param.exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${param.error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Encabezado y botón -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-book"></i> Gestión de Materias</h1>
        <a href="/materias/nuevo" class="btn btn-primary">
            <i class="fas fa-plus"></i> Nueva Materia
        </a>
    </div>

    <!-- Tabla de materias -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Día</th>
                    <th>Hora</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="materia : ${materias}">
                    <td th:text="${materia.idMateria}"></td>
                    <td>
                        <strong th:text="${materia.nombreMateria}"></strong>
                    </td>
                    <td>
                        <span class="badge bg-info text-dark badge-dia" th:text="${materia.diaMateria}"></span>
                    </td>
                    <td>
                        <i class="fas fa-clock"></i>
                        <span th:text="${materia.horaMateria}"></span>
                    </td>
                    <td>
                        <a th:href="@{/materias/{id}(id=${materia.idMateria})}" class="btn btn-sm btn-info" title="Ver">
                            <i class="fas fa-eye"></i>
                        </a>
                        <a th:href="@{/materias/editar/{id}(id=${materia.idMateria})}" class="btn btn-sm btn-warning" title="Editar">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a th:href="@{/materias/eliminar/{id}(id=${materia.idMateria})}" class="btn btn-sm btn-danger" title="Eliminar"
                           onclick="return confirm('¿Está seguro de que desea eliminar esta materia?');">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(materias)}">
                    <td colspan="7" class="text-center text-muted py-4">
                        <i class="fas fa-inbox"></i> No hay materias registradas
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
