<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Maestro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap"></i> Sistema de Notas
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/alumnos">Alumnos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/maestros">Maestros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/materias">Materias</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-chalkboard-user"></i> Detalles del Maestro
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <h6 class="text-muted">ID</h6>
                            </div>
                            <div class="col-sm-8">
                                <p th:text="${maestro.id}"></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <h6 class="text-muted">Nombre</h6>
                            </div>
                            <div class="col-sm-8">
                                <p th:text="${maestro.nombre}"></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <h6 class="text-muted">Apellido</h6>
                            </div>
                            <div class="col-sm-8">
                                <p th:text="${maestro.apellido}"></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-sm-4">
                                <h6 class="text-muted">Email</h6>
                            </div>
                            <div class="col-sm-8">
                                <p>
                                    <a th:href="@{'mailto:' + ${maestro.email}}" th:text="${maestro.email}"></a>
                                </p>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-sm-4">
                                <h6 class="text-muted">Materias</h6>
                            </div>
                            <div class="col-sm-8">
                                <div>
                                    <span th:each="materia : ${maestro.materias}" class="badge bg-success me-1">
                                        <span th:text="${materia.nombreMateria}"></span>
                                    </span>
                                    <span th:if="${#lists.isEmpty(maestro.materias)}" class="text-muted">
                                        Sin materias asignadas
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex">
                            <a th:href="@{/maestros/editar/{id}(id=${maestro.id})}" class="btn btn-warning">
                                <i class="fas fa-edit"></i> Editar
                            </a>
                            <a href="/maestros" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Volver
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
