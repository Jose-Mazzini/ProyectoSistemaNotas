<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Alumno</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 th:text="${alumno.id != null ? 'Editar Alumno' : 'Nuevo Alumno'}"></h5>
        </div>

        <div class="card-body">
            <form th:action="@{/alumnos/guardar}" th:object="${alumno}" method="POST">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>

                <div class="mb-3">
                    <label>Apellido</label>
                    <input type="text" class="form-control" th:field="*{apellido}" required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <button class="btn btn-primary">Guardar</button>
                <a href="/alumnos" class="btn btn-secondary">Cancelar</a>

            </form>
        </div>
    </div>
</div>

</body>
</html>
