<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalles del Alumno</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="/">Sistema de Notas</a>
  </div>
</nav>

<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h5><i class="fas fa-user"></i> Detalles del Alumno</h5>
    </div>

    <div class="card-body">

      <p><strong>ID:</strong> <span th:text="${alumno.id}"></span></p>
      <p><strong>Nombre:</strong> <span th:text="${alumno.nombre}"></span></p>
      <p><strong>Apellido:</strong> <span th:text="${alumno.apellido}"></span></p>
      <p><strong>Email:</strong> <span th:text="${alumno.email}"></span></p>

      <a href="/alumnos" class="btn btn-secondary">Volver</a>
    </div>
  </div>
</div>

</body>
</html>
